name: 爬取分数线数据

run-name: >-
  分数线 ${{ inputs.current_year || 'auto' }}
  p${{ inputs.current_province_index || '0' }}
  ${{ inputs.mode || 'test' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        type: choice
        options:
          - test
          - sample
          - full
        default: test
      years:
        description: '年份范围（可选，如：2025,2024,2023 或 2025-2018）'
        required: false
        type: string
        default: ''
      current_year:
        description: '当前执行年份（自动续跑时使用，手动运行通常留空）'
        required: false
        type: string
        default: ''
      current_province_index:
        description: '当前执行省份索引（自动续跑时使用，手动运行通常留空）'
        required: false
        type: string
        default: ''

  schedule:
    - cron: '0 2 1 * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: crawl-scores-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/scores
          mkdir -p data/scores_progress

      - name: 检查学校数据
        shell: bash
        run: |
          set -euo pipefail
          test -f data/schools.json || (echo "缺少 data/schools.json，请先更新学校数据" && exit 1)
          echo "检测到学校索引文件: data/schools.json"

      - name: 解析当前执行上下文
        id: score_context
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_YEARS: ${{ github.event.inputs.years }}
          INPUT_CURRENT_YEAR: ${{ github.event.inputs.current_year }}
          INPUT_CURRENT_PROVINCE_INDEX: ${{ github.event.inputs.current_province_index }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ]; then
            MODE="full"
            RAW_YEARS="${INPUT_YEARS:-}"
            CURRENT_YEAR=""
            CURRENT_PROVINCE_INDEX=""
          else
            MODE="${INPUT_MODE:-test}"
            RAW_YEARS="${INPUT_YEARS:-}"
            CURRENT_YEAR="${INPUT_CURRENT_YEAR:-}"
            CURRENT_PROVINCE_INDEX="${INPUT_CURRENT_PROVINCE_INDEX:-}"
          fi

          mapfile -t YEAR_LIST < <(bash scripts/resolve_years.sh "$RAW_YEARS" "$MODE")

          if [ "${#YEAR_LIST[@]}" -eq 0 ]; then
            echo "没有可执行年份"
            exit 1
          fi

          YEAR_CSV="$(IFS=,; echo "${YEAR_LIST[*]}")"

          python scripts/plan_chain.py             --years "$YEAR_CSV"             --current-year "$CURRENT_YEAR"             --current-province-index "$CURRENT_PROVINCE_INDEX"             --github-output "$GITHUB_OUTPUT"

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "years_csv=$YEAR_CSV" >> "$GITHUB_OUTPUT"

      - name: 执行当前年份省份
        id: score_run
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
          SCORE_YEAR: ${{ steps.score_context.outputs.current_year }}
          SCORE_PROVINCE_ID: ${{ steps.score_context.outputs.current_province_id }}
          SCORE_PROVINCE_INDEX: ${{ steps.score_context.outputs.current_province_index }}
          SCORE_MODE: ${{ steps.score_context.outputs.mode }}
        run: |
          set -euo pipefail

          case "$SCORE_MODE" in
            test)
              export SAMPLE_SCHOOLS=3
              ;;
            sample)
              export SAMPLE_SCHOOLS=20
              ;;
            full)
              export SAMPLE_SCHOOLS=0
              ;;
            *)
              echo "未知模式: $SCORE_MODE"
              exit 1
              ;;
          esac

          export SCORE_YEARS="$SCORE_YEAR"
          export SCORE_PROGRESS_FILE="data/scores_progress/${SCORE_YEAR}.${SCORE_PROVINCE_ID}.json"
          export SCORE_PROGRESS_DIR="data/scores_progress"
          export SCORE_DATA_DIR="data/scores"
          export SCORE_RUN_DEADLINE_SECONDS=17400
          export SCORE_FLUSH_SCHOOLS=25
          export SCHOOL_DATA_FILE="data/schools.json"

          python scripts/run_scores_once.py             --year "$SCORE_YEAR"             --province-id "$SCORE_PROVINCE_ID"             --province-index "$SCORE_PROVINCE_INDEX"             --mode "$SCORE_MODE"             --github-output "$GITHUB_OUTPUT"

      - name: 提交结果
        id: commit_changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/scores data/scores_progress

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "本轮没有文件变化"
            exit 0
          fi

          git commit -m "📈 分数线 [${{ steps.score_context.outputs.current_year }}] [${{ steps.score_context.outputs.current_province_id }}] [${{ steps.score_context.outputs.mode }}] #${{ github.run_number }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: 计算下一次调度
        id: next_run
        shell: bash
        env:
          RUN_STATUS: ${{ steps.score_run.outputs.run_status }}
          CURRENT_YEAR: ${{ steps.score_context.outputs.current_year }}
          CURRENT_PROVINCE_INDEX: ${{ steps.score_context.outputs.current_province_index }}
          NEXT_YEAR: ${{ steps.score_context.outputs.next_year }}
          NEXT_PROVINCE_INDEX: ${{ steps.score_context.outputs.next_province_index }}
        run: |
          set -euo pipefail

          SHOULD_DISPATCH=false
          TARGET_YEAR=""
          TARGET_PROVINCE_INDEX=""

          case "$RUN_STATUS" in
            partial|paused)
              SHOULD_DISPATCH=true
              TARGET_YEAR="$CURRENT_YEAR"
              TARGET_PROVINCE_INDEX="$CURRENT_PROVINCE_INDEX"
              ;;
            done|skipped)
              if [ -n "$NEXT_YEAR" ] && [ -n "$NEXT_PROVINCE_INDEX" ]; then
                SHOULD_DISPATCH=true
                TARGET_YEAR="$NEXT_YEAR"
                TARGET_PROVINCE_INDEX="$NEXT_PROVINCE_INDEX"
              fi
              ;;
            *)
              echo "未识别状态: $RUN_STATUS"
              ;;
          esac

          echo "should_dispatch=$SHOULD_DISPATCH" >> "$GITHUB_OUTPUT"
          echo "target_year=$TARGET_YEAR" >> "$GITHUB_OUTPUT"
          echo "target_province_index=$TARGET_PROVINCE_INDEX" >> "$GITHUB_OUTPUT"

      - name: 调度下一次运行
        if: steps.next_run.outputs.should_dispatch == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bash scripts/dispatch_next_run.sh             .github/workflows/crawl_scores.yml             "${GITHUB_REF_NAME}"             "${{ steps.score_context.outputs.mode }}"             "${{ steps.score_context.outputs.years_csv }}"             "${{ steps.next_run.outputs.target_year }}"             "${{ steps.next_run.outputs.target_province_index }}"
