name: Crawl Plans

on:
  workflow_dispatch:
    inputs:
      years:
        description: "年份，支持单年(2025)、范围(2025-2020)、列表(2025,2024,2023)"
        required: true
        default: "2025"
      sample_schools:
        description: "仅爬取前 N 所学校，0 表示全部"
        required: false
        default: "0"
      max_workers:
        description: "并发线程数"
        required: false
        default: "6"
      resume_run:
        description: "是否为自动续跑"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

concurrency:
  group: crawl-plans-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      PLAN_YEARS: ${{ inputs.years }}
      SAMPLE_SCHOOLS: ${{ inputs.sample_schools }}
      PLAN_MAX_WORKERS: ${{ inputs.max_workers }}
      PLAN_RESUME: "1"
      PLAN_TIME_LIMIT_SECONDS: "17100"
      PLAN_CHUNK_RECORD_LIMIT: "100000"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure release exists
        shell: bash
        run: |
          gh release view plans-data >/dev/null 2>&1 || \
          gh release create plans-data --title "plans-data" --notes "Chunked plans crawler output"

      - name: Restore progress from release
        shell: bash
        run: |
          mkdir -p data/chunks release-download

          gh release download plans-data \
            -p "plans_progress.json" \
            -p "manifest.json" \
            -D release-download || true

          [ -f release-download/plans_progress.json ] && cp release-download/plans_progress.json data/plans_progress.json || true
          [ -f release-download/manifest.json ] && cp release-download/manifest.json data/manifest.json || true

      - name: Run crawler
        shell: bash
        run: |
          mkdir -p data/chunks
          python -m crawlers.plans "${PLAN_YEARS}" | tee crawl.log

          python - <<'PY'
          import json
          from pathlib import Path

          progress_path = Path("data/plans_progress.json")
          meta = {}

          if progress_path.exists():
              progress = json.loads(progress_path.read_text(encoding="utf-8"))
              meta = progress.get("meta", {})

          Path("resume.env").write_text(
              "\n".join([
                  f"RESUME_REQUIRED={str(meta.get('resume_required', False)).lower()}",
                  f"RESUME_YEARS={meta.get('years_arg', '')}",
                  f"REMAINING_TASKS={meta.get('remaining_tasks', 0)}",
              ]) + "\n",
              encoding="utf-8"
          )
          PY

          cat resume.env >> "$GITHUB_ENV"

      - name: Upload files to release via curl
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          TAG="plans-data"
          REPO="${GITHUB_REPOSITORY}"

          release_id="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id')"
          upload_url="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.upload_url' | sed 's/{?name,label}//')"

          delete_asset_if_exists() {
            local asset_name="$1"
            local asset_id
            asset_id="$(gh api "repos/${REPO}/releases/${release_id}/assets" --paginate --jq ".[] | select(.name == \"${asset_name}\") | .id" | head -n 1 || true)"
            if [ -n "${asset_id}" ]; then
              gh api -X DELETE "repos/${REPO}/releases/assets/${asset_id}"
            fi
          }

          upload_file() {
            local file_path="$1"
            local asset_name
            local content_type
            local attempt

            [ -f "$file_path" ] || return 0

            asset_name="$(basename "$file_path")"

            case "$asset_name" in
              *.jsonl.gz) content_type="application/gzip" ;;
              *.json) content_type="application/json" ;;
              *) content_type="application/octet-stream" ;;
            esac

            delete_asset_if_exists "$asset_name"

            for attempt in 1 2 3; do
              echo "Uploading ${asset_name}, attempt ${attempt}..."
              if curl --fail --silent --show-error --http1.1 \
                -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Content-Type: ${content_type}" \
                --data-binary @"${file_path}" \
                "${upload_url}?name=${asset_name}"; then
                echo "Uploaded ${asset_name}"
                return 0
              fi

              echo "Upload failed for ${asset_name}, retrying..."
              sleep $((attempt * 10))
            done

            echo "Upload failed after 3 attempts: ${asset_name}"
            exit 1
          }

          if compgen -G "data/chunks/*.jsonl.gz" > /dev/null; then
            for f in data/chunks/*.jsonl.gz; do
              upload_file "$f"
            done
          fi

          upload_file "data/plans_progress.json"
          upload_file "data/manifest.json"

      - name: Commit only metadata
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/plans_progress.json data/manifest.json || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: update plans metadata (${PLAN_YEARS}) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          else
            echo "No metadata changes to commit"
          fi

      - name: Trigger resume workflow
        if: always() && env.RESUME_REQUIRED == 'true'
        shell: bash
        run: |
          echo "Need resume, remaining tasks: ${REMAINING_TASKS}"
          gh workflow run plans.yml \
            --ref "${GITHUB_REF_NAME}" \
            -f years="${RESUME_YEARS}" \
            -f sample_schools="${{ inputs.sample_schools }}" \
            -f max_workers="${{ inputs.max_workers }}" \
            -f resume_run="true"
